name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  source-branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require dev as the PR head branch
        shell: bash
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "::error::master can only accept pull requests from dev, but got '${{ github.head_ref }}'."
            exit 1
          fi

  build-master:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
