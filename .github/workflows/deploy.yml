name: Build & Deploy

on:
  pull_request:
    branches: [master]
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: carol

jobs:
  source-branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require dev as the PR head branch
        shell: bash
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "::error::master can only accept pull requests from dev, but got '${{ github.head_ref }}'."
            exit 1
          fi

  build-and-push:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        shell: bash
        run: |
          git fetch origin master
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"

      - name: Lowercase image name (GHCR requires lowercase)
        run: echo "IMAGE_REPO=${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ env.IMAGE_BASE }}" >> $GITHUB_ENV

      - name: Set build metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_version="${GITHUB_REF_NAME#v}"
          echo "BUILD_VERSION=build-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.ref_name }}
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/maimai
            git pull origin master
            docker compose pull
            docker compose up -d
            docker image prune -f
